<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAiGE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PAiGE">

    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #12140e;
            --border-color: #39432d; 
            --glow-green: #79f82c;
            --text-dim: #a1b58f;    
            --text-bright: #79f82c; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-bright);
            font-family: 'Share Tech Mono', 'Source Code Pro', monospace;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px; 
        }

        /* Header Layout */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 10px; 
        }

        /* SVG Heartbeat Pulse Animation Matrix */
        .radio-signal-group {
            animation: broadcastPulse 5s infinite ease-in-out;
        }

        @keyframes broadcastPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Status Indicator */
        .status-container {
            position: absolute; 
            top: 3px;
            right: 12px; 
            left: auto;  
            user-select: none;
            animation: statusPulse 8s infinite ease-in-out; 
        }

        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--text-bright);
            font-weight: bold;
            letter-spacing: 1.5px;
            text-shadow: 0 0 5px rgba(121, 248, 44, 0.5);
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Message Compose Architecture */
        .input-card {
            border: 1px solid var(--border-color);
            background-color: rgba(39, 49, 27, 0.1);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        textarea {
            width: 100%;
            min-height: 80px;
            background: transparent;
            border: none;
            color: #ffffff; 
            font-family: inherit;
            font-size: 16px; 
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: var(--text-dim); 
            opacity: 0.8;
        }

        .char-count {
            font-size: 11px;
            color: var(--text-dim); 
            text-align: right;
            font-weight: 600; 
        }

        .shortcut-hint {
            color: var(--text-dim);
            opacity: 0.9;     
            font-size: 11px;
            letter-spacing: 1px;
            text-align: center;
            margin-top: -8px;
        }

        @media (max-width: 480px) {
            .shortcut-hint {
                display: none;
            }
        }

        /* Control Toggles & Hardware Buttons */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(39, 49, 27, 0.4);
            border: 1px solid var(--border-color);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-dim);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(121, 248, 44, 0.2);
            border-color: var(--glow-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--glow-green);
            box-shadow: 0 0 8px var(--glow-green);
        }

        .toggle-label {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        input:checked ~ .toggle-label {
            color: var(--glow-green);
        }

        /* Interactive Transmission Action Button */
        .btn-send {
            background: transparent;
            border: 1px solid var(--border-color);
            color: rgba(121, 248, 44, 0.25); 
            padding: 8px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed; 
            border-radius: 4px;
            transition: background-color 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease, color 0.1s;
            opacity: 0.5; 
        }

        .btn-send.active {
            color: var(--text-bright); 
            border-color: var(--glow-green); 
            box-shadow: 0 0 8px rgba(121, 248, 44, 0.3); 
            cursor: pointer;
            opacity: 1; 
        }
        
        .btn-send.paging {
            color: var(--glow-green);
            border-color: var(--glow-green);
            animation: transmitPulse 0.5s infinite alternate;
            cursor: wait;
        }

        @keyframes transmitPulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; box-shadow: 0 0 10px rgba(121, 248, 44, 0.4); }
        }

        .btn-send.sent-success {
            color: #ffffff;
            background-color: var(--glow-green);
            border-color: var(--glow-green);
            box-shadow: 0 0 15px rgba(121, 248, 44, 0.8);
            text-shadow: none;
            opacity: 1;
        }

        /* Transmission History Headers */
        .section-header {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        .log-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-timestamp {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
        }

        .log-text {
            color: var(--text-bright);
            font-size: 15px;
            line-height: 1.4;
        }

        /* Core Map Elements */
        .map-container {
            position: relative;
            width: 100%;
            height: 180px; 
            border-radius: 8px;
            overflow: hidden;
            background-color: #0f120d; 
            border: 1px solid var(--border-color);
        }

        .static-map-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            filter: brightness(0.9) contrast(1.1) sepia(1) hue-rotate(75deg) saturate(2.5);
            transition: filter 0.3s ease;
        }

        /* Active Radar Location Tracking System */
        .friend-tracker-dot {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px; 
            height: 7px;
            background-color: var(--glow-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--glow-green);
            z-index: 10;
            transition: top 2.5s ease-in-out, left 2.5s ease-in-out; 
        }

        .friend-tracker-dot::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            width: 31px;
            height: 31px;
            border: 1px solid var(--glow-green);
            border-radius: 50%;
            opacity: 0;
            animation: digitalRadar 1.8s infinite linear;
        }

        @keyframes digitalRadar {
            0% { transform: scale(0.1); opacity: 1; }
            50% { opacity: 0.4; }
            100% { transform: scale(1.0); opacity: 0; }
        }

        /* -----------------------------------------------------------------
           CLEAN CRITICAL PRIORITY TAKE-OVER STATE (NO BREATHING VIGNETTE)
        -------------------------------------------------------------------- */
        .priority-mode-active {
            --glow-green: #ff3b30;     /* Laser Crimson Red */
            --text-bright: #ff3b30;    /* Full interface color inversion down the tree */
        }

        /* Force the switch container to flash critical red */
        #urgency-toggle:checked + .slider {
            background-color: #ff3b30 !important;
            box-shadow: 0 0 12px rgba(255, 59, 48, 0.8);
        }

        /* Make the compose box border turn red */
        .priority-mode-active .input-card {
            border-color: #ff3b30 !important;
            box-shadow: inset 0 0 8px rgba(255, 59, 48, 0.2);
        }

        /* Tactical Map Grid Shift */
        .priority-mode-active .static-map-img {
            filter: brightness(0.7) contrast(1.2) sepia(1) hue-rotate(310deg) saturate(3) !important;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="status-container">
            <span class="status-text">● ONLINE</span>
        </div>
        
        <header>
            <!-- Corrected, high-fidelity PAiGE vector display -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" class="logo-image" style="height: 80px; width: auto; display: block;">
                <!-- Main Logo Text Group -->
                <text x="160" y="70" 
                      text-anchor="middle" 
                      font-family="'Share Tech Mono', monospace" 
                      font-size="68" 
                      font-weight="bold" 
                      fill="currentColor" 
                      letter-spacing="6">PAiGE</text>
                
                <!-- Wireless Transmitter Waves aligned precisely over the lowercase 'i' -->
                <g class="radio-signal-group" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                    <!-- Concentric radar waves -->
                    <path d="M 148 16 A 16 16 0 0 0 148 36" opacity="0.8"/>
                    <path d="M 172 16 A 16 16 0 0 1 172 36" opacity="0.8"/>
                    <path d="M 141 9 A 26 26 0 0 0 141 43" opacity="0.5"/>
                    <path d="M 179 9 A 26 26 0 0 1 179 43" opacity="0.5"/>
                </g>
            </svg>
        </header>

        <div class="input-card">
            <textarea placeholder="COMPOSE..." maxlength="160" id="message-input"></textarea>
            <div class="char-count"><span id="char-counter">0</span> / 160</div>
            
            <div class="controls">
                <label class="toggle-container">
                    <span class="switch">
                        <input type="checkbox" id="urgency-toggle" checked>
                        <span class="slider"></span>
                    </span>
                    <span class="toggle-label">PRIORITY</span>
                </label>
                <button class="btn-send" id="send-btn" disabled>PAGE</button>
            </div>
        </div>

        <div class="shortcut-hint">⌘ + ENTER TO SEND</div>

        <div class="section-header">recent pages</div>
        <div class="log-card">
            <div class="log-timestamp">Jul 16, 2026 10:47 AM</div>
            <div class="log-text">Hi, When will you be home?</div>
        </div>

        <div class="tracker-card">
            <div class="section-header">Location Tracking</div>
            <div class="map-container" style="margin-top: 10px;">
                <img src="map-static.png" alt="Manhattan Tracking Map" class="static-map-img">
                <div id="dynamic-blip" class="friend-tracker-dot"></div>
            </div>
        </div>
    </div>

<script>
    const input = document.getElementById('message-input');
    const counter = document.getElementById('char-counter');
    const btn = document.getElementById('send-btn');
    const container = document.querySelector('.log-card')?.parentNode;

    // 1. Text parsing field listeners
    input.addEventListener('input', () => {
        const currentLength = input.value.length;
        counter.textContent = currentLength;

        if (currentLength > 0 && !btn.classList.contains('paging') && !btn.classList.contains('sent-success')) {
            btn.classList.add('active');
            btn.disabled = false;
        } else if (currentLength === 0) {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    });

    // 2. Transmit operations
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        if (!input.value.trim()) return;

        const originalText = input.value;

        btn.disabled = true;
        btn.classList.remove('active');
        btn.classList.add('paging');
        btn.textContent = 'PAGING...';

        input.value = '';
        counter.textContent = '0';

        setTimeout(() => {
            btn.classList.remove('paging');
            btn.classList.add('sent-success');
            btn.textContent = 'SENT';

            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateString = new Date().toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
            
            const newCard = document.createElement('div');
            newCard.className = 'log-card';
            newCard.style.marginTop = '15px';
            newCard.innerHTML = `
                <div class="log-timestamp">${dateString} ${timeString}</div>
                <div class="log-text">${originalText}</div>
            `;

            if (container) {
                const sectionHeader = document.querySelector('.section-header');
                if (sectionHeader && sectionHeader.nextSibling) {
                    sectionHeader.parentNode.insertBefore(newCard, sectionHeader.nextSibling);
                } else {
                    container.prepend(newCard);
                }
            }

            setTimeout(() => {
                btn.classList.remove('sent-success');
                btn.textContent = 'PAGE';
                btn.disabled = true;
            }, 1500);

        }, 2000); 
    });

    // 3. Dynamic radar updates
    function simulateBlipMovement() {
        const blip = document.getElementById('dynamic-blip');
        if (!blip) return;

        const minPct = 40;
        const maxPct = 60;

        setInterval(() => {
            const randomTop = Math.floor(Math.random() * (maxPct - minPct + 1)) + minPct;
            const randomLeft = Math.floor(Math.random() * (maxPct - minPct + 1)) + minPct;

            blip.style.top = `${randomTop}%`;
            blip.style.left = `${randomLeft}%`;
        }, 4000);
    }

    document.addEventListener('DOMContentLoaded', simulateBlipMovement);
    const toggle = document.getElementById('urgency-toggle');

    // 4. Global interface class injection
    toggle.addEventListener('change', () => {
        if (toggle.checked) {
            document.body.classList.add('priority-mode-active');
        } else {
            document.body.classList.remove('priority-mode-active');
        }
    });

    if (toggle && toggle.checked) {
        document.body.classList.add('priority-mode-active');
    }
</script>
</body>
</html>
