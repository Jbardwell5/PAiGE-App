<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAiGE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PAiGE">

    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
    --bg-color: #12140e;
    --border-color: #39432d; /* Hardened borders for better visibility */
    --glow-green: #79f82c;
    --text-dim: #a1b58f;    /* BUMPED: Was dim olive, now a bright, legible sage */
    --text-bright: #79f82c; /* The ultra-bright brand green */
}

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-bright);
            font-family: 'Share Tech Mono', 'Source Code Pro', monospace;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* Container designed to fit mobile viewport */
        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px; /* Space at bottom for home indicator */
        }

        /* Header / Logo */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 10px; /* Adds extra breathing room before the larger logo */
        }
        
      /* Simplified Status Indicator */
        .status-container {
            position: absolute; /* This is the anchor for the status indicator */
            /* ... your other container styles ... */
            top: 3px;
            right: 12px; /* Forces it to the right */
            left: auto;  /* Overrides any leftover left positioning */
            user-select: none;
            /* Simple 8-second gentle pulse for the whole indicator */
            animation: statusPulse 8s infinite ease-in-out; 
        }

        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--primary-glow);
            font-weight: bold;
            letter-spacing: 1.5px;
            text-shadow: 0 0 5px rgba(121, 248, 44, 0.5);
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .logo-image {
            height: 125px; /* Making the logo larger */
            width: auto;  /* Prevents any horizontal stretching */
            display: block;
        }

        /* Message Input Box */
        .input-card {
            border: 1px solid var(--border-color);
            background-color: rgba(39, 49, 27, 0.1);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        textarea {
    width: 100%;
    min-height: 80px;
    background: transparent;
    border: none;
    color: #ffffff; /* FIXED: Pure white text guarantees visibility in daylight */
    font-family: inherit;
    font-size: 16px; /* BUMPED: 16px also prevents iOS from auto-zooming the screen */
    resize: none;
    outline: none;
}

/* Placeholder text color */
textarea::placeholder {
    color: var(--text-dim); /* Clearer, brighter placeholder */
    opacity: 0.8;
}

        .char-count {
    font-size: 11px;
    color: var(--text-dim); /* Utilizes the brighter sage color */
    text-align: right;
    font-weight: 600; /* Added weight to help cut through glare */
}

/* The ⌘ + ENTER TO SEND hint text */
.shortcut-hint {
    color: var(--text-dim);
    opacity: 0.9;     /* Pushed up from being washed out */
    font-size: 11px;
    letter-spacing: 1px;
}

/* Recent Pages Timestamp */
.message-card small {
    display: block;
    text-align: right;
    margin-top: 10px;
    color: var(--text-dim); /* Lifted from the old dark green */
    font-weight: 600;
}

        /* Controls: Toggle & Send Button */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        /* Urgency Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(39, 49, 27, 0.4);
            border: 1px solid var(--border-color);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-dim);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(121, 248, 44, 0.2);
            border-color: var(--glow-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--glow-green);
            box-shadow: 0 0 8px var(--glow-green);
        }

        .toggle-label {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        input:checked ~ .toggle-label {
            color: var(--glow-green);
        }

        /* Send Button */
        .btn-send {
            background: transparent;
            border: 1px solid var(--border-color);
            color: rgba(121, 248, 44, 0.25); /* Dimmed green when empty */
            padding: 8px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed; /* Shows a "no" cursor on desktop when empty */
            border-radius: 4px;
            transition: background-color 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease, color 0.1s;
            opacity: 0.5; /* Slightly faded out */
        }

        /* The glowing style that gets triggered when there is text */
        .btn-send.active {
            color: var(--primary-glow); /* Bright, glowing green text */
            border-color: var(--glow-green); /* Glowing green border */
            box-shadow: 0 0 8px rgba(121, 248, 44, 0.3); /* Subtle green outer glow */
            cursor: pointer;
            opacity: 1; /* Fully visible */
        }
        
        /* Transmitting State (Pulsing text) */
        .btn-send.paging {
            color: var(--glow-green);
            border-color: var(--primary-glow);
            animation: transmitPulse 0.5s infinite alternate;
            cursor: wait;
        }

        @keyframes transmitPulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; box-shadow: 0 0 10px rgba(121, 248, 44, 0.4); }
        }

        /* Sent Success State (Solid bright glow) */
        .btn-send.sent-success {
            color: #ffffff;
            background-color: var(--primary-glow);
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(121, 248, 44, 0.8);
            text-shadow: none;
            opacity: 1;
        }
        
       .shortcut-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: -8px;
        }

        /* Hide the shortcut hint on mobile devices */
        @media (max-width: 480px) {
            .shortcut-hint {
                display: none;
            }
        }

        /* Transmission Log Header */
        .section-header {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        /* Message Bubble Card */
        .log-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-timestamp {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
        }

        .log-text {
            color: var(--text-bright);
            font-size: 15px;
            line-height: 1.4;
        }

        /* Location Tracking Card */
        .location-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 40px; /* Push the access denied text down */
        }

        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-title {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-bright);
        }

        .btn-enable {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--glow-green);
            padding: 4px 14px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Access Denied Warning */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            padding: 20px 0;
        }

        .error-title {
            color: var(--alert-red);
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .error-desc {
            color: #8c443e;
            font-size: 11px;
            line-height: 1.4;
            max-width: 280px;
        }

     /* Map Container: Optimized for real map images */
        .map-container {
            position: relative;
            width: 100%;
            height: 180px; 
            border-radius: 8px;
            overflow: hidden;
            background-color: #0f120d; /* Background color behind the map */
            border: 1px solid var(--border-color);
        }

        /* The Static Map Image: This filter stack makes standard map dark modes look premium */
        .static-map {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Important: prevents stretching */
            filter: brightness(0.65) contrast(1.1) grayscale(0.5) sepia(0.2);
        }

        /* Premium "Blip" Tracker Dot */
        .friend-tracker-dot {
            position: absolute;
            top: 50%; /* We are centering it for the demo macro view */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px; /* Tiny, high-fidelity blip */
            height: 7px;
            background-color: var(--glow-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--glow-green);
            z-index: 10;
        }

        /* Fast, sharp digital "Blip" animation (not a pulse) */
        .friend-tracker-dot::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            width: 31px;
            height: 31px;
            border: 1px solid var(--glow-green);
            border-radius: 50%;
            opacity: 0;
            animation: digitalBlip 1s infinite linear;
        }

        @keyframes digitalBlip {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(1.0); opacity: 0; }
        }/* Map Container Setup */
.map-container {
    position: relative;
    width: 100%;
    height: 180px; 
    border-radius: 8px;
    overflow: hidden;
    background-color: #0f120d; /* Deep olive-black */
    border: 1px solid var(--border-color);
}

/* Hardened Terminal Green Filter Matrix */
.static-map-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.75;
    /* This shifts the grays into a crisp, glowing digital green hue */
    filter: brightness(0.9) contrast(1.1) sepia(1) hue-rotate(75deg) saturate(2.5);
}

/* High-Fidelity "Blip" Tracker Dot */
.friend-tracker-dot {
    position: absolute;
    top: 50%; /* Initial starting position */
    left: 50%;
    transform: translate(-50%, -50%);
    width: 7px; 
    height: 7px;
    background-color: var(--glow-green);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--glow-green);
    z-index: 10;
    transition: top 2.5s ease-in-out, left 2.5s ease-in-out; /* Smooths out the movement */
}

/* Pulsing Outer Radar Ring */
.friend-tracker-dot::after {
    content: '';
    position: absolute;
    top: -12px;
    left: -12px;
    width: 31px;
    height: 31px;
    border: 1px solid var(--glow-green);
    border-radius: 50%;
    opacity: 0;
    animation: digitalRadar 1.8s infinite linear;
}

@keyframes digitalRadar {
    0% { transform: scale(0.1); opacity: 1; }
    50% { opacity: 0.4; }
    100% { transform: scale(1.0); opacity: 0; }
}
        }
    </style>
</head>
<body>

    <div class="app-container">
       <div class="status-container">
            <span class="status-text">● ONLINE</span>
        </div>
        
      <header>
            <img src="apple-touch-logo.png" alt="PAiGE Logo" class="logo-image">
        </header>

        <div class="input-card">
            <textarea placeholder="COMPOSE..." maxlength="160" id="message-input"></textarea>
            <div class="char-count"><span id="char-counter">0</span> / 160</div>
            
            <div class="controls">
                <label class="toggle-container">
                    <span class="switch">
                        <input type="checkbox" id="urgency-toggle" checked>
                        <span class="slider"></span>
                    </span>
                    <span class="toggle-label">PRIORITY</span>
                </label>
                <button class="btn-send">PAGE</button>
            </div>
        </div>

        <div class="shortcut-hint">⌘ + ENTER TO SEND</div>

        <div class="section-header">recent pages</div>
        <div class="log-card">
            <div class="log-timestamp">Jul 16, 2026 10:47 AM</div>
            <div class="log-text">Hi, When will you be home?</div>
        </div>

      <!-- Pager Location Tracker - Static Map with Dynamic Blip -->
<div class="tracker-card">
    <div class="section-header">Location Tracking</div>
    <div class="map-container" style="margin-top: 10px;">
        
        <!-- The Static Background Map -->
        <img src="map-static.png" alt="Manhattan Tracking Map" class="static-map-img">
        
        <!-- The Simulated Moving Dot & Radar Rings -->
        <div id="dynamic-blip" class="friend-tracker-dot"></div>
        
    </div>
</div>

  <script>
        const textarea = document.getElementById('message-input');
        const counter = document.getElementById('char-counter');
        const sendButton = document.querySelector('.btn-send');

        // Set initial state of the button
        sendButton.disabled = true;

        // Monitor character count and toggle button active state
        textarea.addEventListener('input', () => {
            const currentLength = textarea.value.length;
            counter.textContent = currentLength;

            // Only toggle if we aren't currently sending a message
            if (!sendButton.classList.contains('transmitting') && !sendButton.classList.contains('sent-success')) {
                if (currentLength > 0) {
                    sendButton.classList.add('active');
                    sendButton.disabled = false;
                } else {
                    sendButton.classList.remove('active');
                    sendButton.disabled = true;
                }
            }
        });

        // The Sending Action Sequence
        sendButton.addEventListener('click', (e) => {
            e.preventDefault(); // Prevent any form submission defaults

            // 1. Change to PAGING state
            sendButton.disabled = true;
            sendButton.classList.remove('active');
            sendButton.classList.add('paging');
            sendButton.textContent = 'PAGING...';

            // Clear the input box and counter immediately so it feels like the message has been "sent"
            textarea.value = '';
            counter.textContent = '0';

            // 2. After 3 seconds of "paging", switch to SENT
            setTimeout(() => {
                sendButton.classList.remove('paging');
                sendButton.classList.add('sent-success');
                sendButton.textContent = 'SENT';

                // 3. After 1.5 more second, reset back to the default empty PAGE state
                setTimeout(() => {
                    sendButton.classList.remove('sent-success');
                    sendButton.textContent = 'PAGE';
                }, 1500);

            }, 3000);
        });
      <script>
    // Simulated tracking matrix for the static map
    function simulateBlipMovement() {
        const blip = document.getElementById('dynamic-blip');
        if (!blip) return;

        // Bound variables keep the dot in the center region of Manhattan/New York labels
        const minPct = 40;
        const maxPct = 60;

        setInterval(() => {
            // Generate minor random coordinate shifts
            const randomTop = Math.floor(Math.random() * (maxPct - minPct + 1)) + minPct;
            const randomLeft = Math.floor(Math.random() * (maxPct - minPct + 1)) + minPct;

            // Apply new coordinates
            blip.style.top = `${randomTop}%`;
            blip.style.left = `${randomLeft}%`;
        }, 4000); // Shifting coordinates smoothly every 4 seconds
    }

    // Fire up the tracking loop when the document loads
    document.addEventListener('DOMContentLoaded', simulateBlipMovement);
    </script>
    
</body>
</html>
