<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAiGE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PAiGE">

    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #12140e;
            --border-color: #27311b;
            --glow-green: #79f82c;
            --text-dim: #5c6c4c;
            --text-bright: #9efb61;
            --alert-red: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-bright);
            font-family: 'Share Tech Mono', 'Source Code Pro', monospace;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* Container designed to fit mobile viewport */
        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px; /* Space at bottom for home indicator */
        }

        /* Header / Logo */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 10px; /* Adds extra breathing room before the larger logo */
        }
        
      /* Simplified Status Indicator */
        .status-container {
            position: absolute; /* This is the anchor for the status indicator */
            /* ... your other container styles ... */
            top: 3px;
            right: 12px; /* Forces it to the right */
            left: auto;  /* Overrides any leftover left positioning */
            user-select: none;
            /* Simple 8-second gentle pulse for the whole indicator */
            animation: statusPulse 8s infinite ease-in-out; 
        }

        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--primary-glow);
            font-weight: bold;
            letter-spacing: 1.5px;
            text-shadow: 0 0 5px rgba(121, 248, 44, 0.5);
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .logo-image {
            height: 125px; /* Making the logo larger */
            width: auto;  /* Prevents any horizontal stretching */
            display: block;
        }

        /* Message Input Box */
        .input-card {
            border: 1px solid var(--border-color);
            background-color: rgba(39, 49, 27, 0.1);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        textarea {
            width: 100%;
            height: 93px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-bright);
            font-family: inherit;
            font-size: 16px;
            resize: none;
        }

        textarea::placeholder {
            color: var(--text-dim);
        }

        .char-count {
            text-align: right;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Controls: Toggle & Send Button */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        /* Urgency Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(39, 49, 27, 0.4);
            border: 1px solid var(--border-color);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-dim);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(121, 248, 44, 0.2);
            border-color: var(--glow-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--glow-green);
            box-shadow: 0 0 8px var(--glow-green);
        }

        .toggle-label {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        input:checked ~ .toggle-label {
            color: var(--glow-green);
        }

        /* Send Button */
        .btn-send {
            background: transparent;
            border: 1px solid var(--border-color);
            color: rgba(121, 248, 44, 0.25); /* Dimmed green when empty */
            padding: 8px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed; /* Shows a "no" cursor on desktop when empty */
            border-radius: 4px;
            transition: background-color 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease, color 0.1s;
            opacity: 0.5; /* Slightly faded out */
        }

        /* The glowing style that gets triggered when there is text */
        .btn-send.active {
            color: var(--primary-glow); /* Bright, glowing green text */
            border-color: var(--glow-green); /* Glowing green border */
            box-shadow: 0 0 8px rgba(121, 248, 44, 0.3); /* Subtle green outer glow */
            cursor: pointer;
            opacity: 1; /* Fully visible */
        }
        
        /* Transmitting State (Pulsing text) */
        .btn-send.paging {
            color: var(--glow-green);
            border-color: var(--primary-glow);
            animation: transmitPulse 0.5s infinite alternate;
            cursor: wait;
        }

        @keyframes transmitPulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; box-shadow: 0 0 10px rgba(121, 248, 44, 0.4); }
        }

        /* Sent Success State (Solid bright glow) */
        .btn-send.sent-success {
            color: #ffffff;
            background-color: var(--primary-glow);
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(121, 248, 44, 0.8);
            text-shadow: none;
            opacity: 1;
        }
        
       .shortcut-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: -8px;
        }

        /* Hide the shortcut hint on mobile devices */
        @media (max-width: 480px) {
            .shortcut-hint {
                display: none;
            }
        }

        /* Transmission Log Header */
        .section-header {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        /* Message Bubble Card */
        .log-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-timestamp {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
        }

        .log-text {
            color: var(--text-bright);
            font-size: 15px;
            line-height: 1.4;
        }

        /* Location Tracking Card */
        .location-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 40px; /* Push the access denied text down */
        }

        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-title {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-bright);
        }

        .btn-enable {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--glow-green);
            padding: 4px 14px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Access Denied Warning */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            padding: 20px 0;
        }

        .error-title {
            color: var(--alert-red);
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .error-desc {
            color: #8c443e;
            font-size: 11px;
            line-height: 1.4;
            max-width: 280px;
        }

        /* Map Tracker Card */
        .tracker-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 180px; 
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .static-map {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Extra filter to make standard maps match your ultra-stealthy aesthetic */
            filter: brightness(0.55) contrast(1.25) grayscale(0.45); 
        }

        /* Pulsing Radar Tracker Dot */
        .tracker-dot {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background-color: var(--glow-green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--glow-green);
            z-index: 10;
        }

        /* The glowing radar ring radiating outward */
        .tracker-dot::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            width: 36px;
            height: 36px;
            border: 2px solid var(--glow-green);
            border-radius: 50%;
            opacity: 0;
            animation: radarPing 2.2s infinite ease-out;
        }

        @keyframes radarPing {
            0% {
                transform: scale(0.15);
                opacity: 0.9;
            }
            50% {
                opacity: 0.4;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
       <div class="status-container">
            <span class="status-text">● ONLINE</span>
        </div>
        
      <header>
            <img src="apple-touch-logo.png" alt="PAiGE Logo" class="logo-image">
        </header>

        <div class="input-card">
            <textarea placeholder="COMPOSE..." maxlength="160" id="message-input"></textarea>
            <div class="char-count"><span id="char-counter">0</span> / 160</div>
            
            <div class="controls">
                <label class="toggle-container">
                    <span class="switch">
                        <input type="checkbox" id="urgency-toggle" checked>
                        <span class="slider"></span>
                    </span>
                    <span class="toggle-label">PRIORITY</span>
                </label>
                <button class="btn-send">PAGE</button>
            </div>
        </div>

        <div class="shortcut-hint">⌘ + ENTER TO SEND</div>

        <div class="section-header">recent pages</div>
        <div class="log-card">
            <div class="log-timestamp">Jul 16, 2026 10:47 AM</div>
            <div class="log-text">Hi, When will you be home?</div>
        </div>

       <div class="tracker-card">
            <div class="section-header">Location Tracking</div>
            <div class="map-container" style="margin-top: 10px;">
                <img class="static-map" src="https://api.mapbox.com/styles/v1/mapbox/dark-v11/static/-88.0198,44.4605,10,0/600x360?access_token=pk.eyJ1IjoiamJhcmR3ZWxsNSIsImEiOiJjbHozbXBlYTAwMDFnMmpxM3M4Z3Rtc3RwIn0.example_token" onerror="this.src='https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=600&q=80'" alt="Green Bay Area Map">
                
                <div class="tracker-dot"></div>
            </div>
        </div>

  <script>
        const textarea = document.getElementById('message-input');
        const counter = document.getElementById('char-counter');
        const sendButton = document.querySelector('.btn-send');

        // Set initial state of the button
        sendButton.disabled = true;

        // Monitor character count and toggle button active state
        textarea.addEventListener('input', () => {
            const currentLength = textarea.value.length;
            counter.textContent = currentLength;

            // Only toggle if we aren't currently sending a message
            if (!sendButton.classList.contains('transmitting') && !sendButton.classList.contains('sent-success')) {
                if (currentLength > 0) {
                    sendButton.classList.add('active');
                    sendButton.disabled = false;
                } else {
                    sendButton.classList.remove('active');
                    sendButton.disabled = true;
                }
            }
        });

        // The Sending Action Sequence
        sendButton.addEventListener('click', (e) => {
            e.preventDefault(); // Prevent any form submission defaults

            // 1. Change to PAGING state
            sendButton.disabled = true;
            sendButton.classList.remove('active');
            sendButton.classList.add('paging');
            sendButton.textContent = 'PAGING...';

            // Clear the input box and counter immediately so it feels like the message has been "sent"
            textarea.value = '';
            counter.textContent = '0';

            // 2. After 3 seconds of "paging", switch to SENT
            setTimeout(() => {
                sendButton.classList.remove('paging');
                sendButton.classList.add('sent-success');
                sendButton.textContent = 'SENT';

                // 3. After 1.5 more second, reset back to the default empty PAGE state
                setTimeout(() => {
                    sendButton.classList.remove('sent-success');
                    sendButton.textContent = 'PAGE';
                }, 1500);

            }, 3000);
        });
    </script>
    
</body>
</html>
