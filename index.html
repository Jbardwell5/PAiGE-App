<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAiGE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PAiGE">

    <link class="logo-source" rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #12140e;
            --border-color: #39432d; 
            --glow-green: #79f82c;
            --text-dim: #a1b58f;    
            --text-bright: #79f82c; 
            
            /* Rigid status alert alerts (Flat tones, no high-tech glow bloat) */
            --alert-amber: #ff9f0a;
            --alert-red: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-bright);
            font-family: 'Share Tech Mono', 'Source Code Pro', monospace;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px; 
        }

        /* Header Layout & Logo Frame */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 10px; 
        }

        .logo-image {
            height: 80px;
            width: auto;
            display: block;
            transition: filter 0.3s ease;
        }
        
        /* Device Status Ticker */
        .status-container {
            position: absolute; 
            top: 3px;
            right: 12px; 
            left: auto;  
            user-select: none;
            animation: statusPulse 8s infinite ease-in-out; 
        }

        .status-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--text-bright);
            font-weight: bold;
            letter-spacing: 1.5px;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Message Console Matrix */
        .input-card {
            border: 1px solid var(--border-color);
            background-color: rgba(39, 49, 27, 0.1);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        textarea {
            width: 100%;
            min-height: 80px;
            background: transparent;
            border: none;
            color: #ffffff; 
            font-family: inherit;
            font-size: 16px; 
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: var(--text-dim); 
            opacity: 0.8;
        }

        /* Retro SMS Character Readout */
        .char-count {
            font-size: 11px;
            color: var(--text-dim); 
            text-align: right;
            font-weight: 600; 
            transition: color 0.15s ease;
        }
        
        /* Character Warn Threshold states (Flat utility fills) */
        .char-count.warning { color: var(--alert-amber) !important; }
        .char-count.critical { color: var(--alert-red) !important; }

        .shortcut-hint {
            color: var(--text-dim);
            opacity: 0.9;     
            font-size: 11px;
            letter-spacing: 1px;
            text-align: center;
            margin-top: -8px;
        }

        @media (max-width: 480px) {
            .shortcut-hint {
                display: none;
            }
        }

        /* Integrated UI Switches */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(39, 49, 27, 0.4);
            border: 1px solid var(--border-color);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-dim);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(121, 248, 44, 0.2);
            border-color: var(--glow-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--glow-green);
        }

        .toggle-label {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        input:checked ~ .toggle-label {
            color: var(--glow-green);
        }

        /* Action Buttons */
        .btn-send {
            background: transparent;
            border: 1px solid var(--border-color);
            color: rgba(121, 248, 44, 0.25); 
            padding: 8px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed; 
            border-radius: 4px;
            transition: background-color 0.1s ease, border-color 0.1s ease, color 0.1s;
            opacity: 0.5; 
        }

        .btn-send.active {
            color: var(--text-bright); 
            border-color: var(--glow-green); 
            cursor: pointer;
            opacity: 1; 
        }
        
        .btn-send.paging {
            color: var(--glow-green);
            border-color: var(--glow-green);
            animation: transmitPulse 0.5s infinite alternate;
            cursor: wait;
        }

        @keyframes transmitPulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .btn-send.sent-success {
            color: #ffffff;
            background-color: var(--glow-green);
            border-color: var(--glow-green);
            opacity: 1;
        }

        /* Structural Page Logs */
        .section-header {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        .log-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* Explicitly defaults historical tracking text to standard Green */
            color: #79f82c !important;
        }

        .log-timestamp {
            font-size: 11px;
            color: var(--text-dim); /* Matches Compose placeholder and Character counter color */
            text-align: right;
            width: 100%;
            display: block;
        }

        .log-text {
            font-size: 15px;
            line-height: 1.4;
            color: inherit; /* Dynamically respects if card parent is priority or standard */
        }

        /* -----------------------------------------------------------------
           ISOLATED HARDWARE LOG PRIORITY STATES (Maintains historic records)
        -------------------------------------------------------------------- */
        .log-card.is-priority-transmission {
            border-color: var(--alert-red) !important;
            color: var(--alert-red) !important;
        }
        .log-card.is-priority-transmission .log-text {
            color: var(--alert-red) !important;
        }

        /* Page Delivery & Read Receipts System */
        .log-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            letter-spacing: 0.5px;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px dashed rgba(57, 67, 45, 0.3);
        }

        .delivery-status {
            color: var(--text-dim);
            font-weight: 600;
        }

        .read-status {
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 10px;
            transition: all 0.3s ease;
        }

        .read-status.unread {
            background-color: rgba(255, 159, 10, 0.15);
            color: var(--alert-amber); 
            border: 1px solid rgba(255, 159, 10, 0.3);
        }

        .read-status.read {
            background-color: rgba(121, 248, 44, 0.1);
            color: #79f82c;
            border: 1px solid rgba(121, 248, 44, 0.2);
        }
        
        /* Isolated priority card read badge override */
        .log-card.is-priority-transmission .read-status.read {
            background-color: rgba(255, 59, 48, 0.1);
            color: var(--alert-red);
            border: 1px solid rgba(255, 59, 48, 0.2);
        }

        /* Map Components */
        .map-container {
            position: relative;
            width: 100%;
            height: 180px; 
            border-radius: 8px;
            overflow: hidden;
            background-color: #0f120d; 
            border: 1px solid var(--border-color);
        }

        .static-map-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.75;
            filter: brightness(0.9) contrast(1.1) sepia(1) hue-rotate(75deg) saturate(2.5);
            transition: filter 0.3s ease;
        }

        /* Active Blip Target */
        .friend-tracker-dot {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px; 
            height: 7px;
            background-color: #79f82c;
            border-radius: 50%;
            z-index: 10;
            transition: top 2.5s ease-in-out, left 2.5s ease-in-out; 
        }

        .friend-tracker-dot::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            width: 31px;
            height: 31px;
            border: 1px solid #79f82c;
            border-radius: 50%;
            opacity: 0;
            animation: digitalRadar 1.8s infinite linear;
        }

        @keyframes digitalRadar {
            0% { transform: scale(0.1); opacity: 1; }
            50% { opacity: 0.4; }
            100% { transform: scale(1.0); opacity: 0; }
        }

        /* -----------------------------------------------------------------
           CRITICAL PRIORITY LIVE CONSOLE STATE (DOES NOT AFFECT LOG HISTORY)
        -------------------------------------------------------------------- */
        .priority-mode-active {
            --glow-green: #ff3b30;     
            --text-bright: #ff3b30;    
        }

        .priority-mode-active .logo-image {
            filter: brightness(0.9) contrast(1.2) sepia(1) hue-rotate(290deg) saturate(3.5);
        }

        #urgency-toggle:checked + .slider {
            background-color: #ff3b30 !important;
        }

        .priority-mode-active .input-card {
            border-color: #ff3b30 !important;
        }

        .priority-mode-active .static-map-img {
            filter: brightness(0.7) contrast(1.2) sepia(1) hue-rotate(310deg) saturate(3) !important;
            opacity: 0.85;
        }
        
        .priority-mode-active .friend-tracker-dot {
            background-color: var(--alert-red) !important;
        }
        .priority-mode-active .friend-tracker-dot::after {
            border-color: var(--alert-red) !important;
        }

        /* -----------------------------------------------------------------
           HARD BREATHING ANIMATION OVERRIDE KILL-SWITCH
        -------------------------------------------------------------------- */
        * { animation-name: none; }
        .status-container { animation: statusPulse 8s infinite ease-in-out; }
        .btn-send.paging { animation: transmitPulse 0.5s infinite alternate; }
        .friend-tracker-dot::after { animation: digitalRadar 1.8s infinite linear; }
        .input-card, .log-card, .tracker-card, body { animation: none !important; box-shadow: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="status-container">
            <span class="status-text">● ONLINE</span>
        </div>
        
        <header>
            <img src="apple-touch-logo.png" alt="PAiGE Logo" class="logo-image">
        </header>

        <div class="input-card">
            <textarea placeholder="COMPOSE..." maxlength="160" id="message-input"></textarea>
            <div class="char-count" id="char-count-wrapper"><span id="char-counter">160</span> REMAINING</div>
            
            <div class="controls">
                <label class="toggle-container">
                    <span class="switch">
                        <input type="checkbox" id="urgency-toggle" checked>
                        <span class="slider"></span>
                    </span>
                    <span class="toggle-label">PRIORITY</span>
                </label>
                <button class="btn-send" id="send-btn" disabled>PAGE</button>
            </div>
        </div>

        <div class="shortcut-hint">⌘ + ENTER TO SEND</div>

        <div class="section-header">recent pages</div>
        
        <!-- Parent container where logging records append dynamically -->
        <div id="log-history-container">
            <div class="log-card">
                <div class="log-timestamp">Jul 20, 2026 12:47 PM</div>
                <div class="log-text">Hi, When will you be home?</div>
                <div class="log-status-row">
                    <span class="delivery-status">✓ DELIVERED</span>
                    <span class="read-status read">READ</span>
                </div>
            </div>
        </div>

        <div class="tracker-card">
            <div class="section-header">Location Tracking</div>
            <div class="map-container" style="margin-top: 10px;">
                <img src="map-static.png" alt="Tracking Grid" class="static-map-img">
                <div id="dynamic-blip" class="friend-tracker-dot"></div>
            </div>
        </div>
    </div>

<script>
    const input = document.getElementById('message-input');
    const counter = document.getElementById('char-counter');
    const countWrapper = document.getElementById('char-count-wrapper');
    const btn = document.getElementById('send-btn');
    const toggle = document.getElementById('urgency-toggle');

    // Bulletproof container fallback to keep transmit sequence from getting stuck
    const logHistoryContainer = document.getElementById('log-history-container') || document.querySelector('.log-card')?.parentNode;

    // 1. Retro Character Countdown System with Flat Warning Swaps
    input.addEventListener('input', () => {
        const maxLength = 160;
        const currentLength = input.value.length;
        const remaining = maxLength - currentLength;
        
        counter.textContent = remaining;

        if (remaining <= 10) {
            countWrapper.className = 'char-count critical';
        } else if (remaining <= 20) {
            countWrapper.className = 'char-count warning';
        } else {
            countWrapper.className = 'char-count';
        }

        if (currentLength > 0 && !btn.classList.contains('paging') && !btn.classList.contains('sent-success')) {
            btn.classList.add('active');
            btn.disabled = false;
        } else if (currentLength === 0) {
            btn.classList.remove('active');
            btn.disabled = true;
        }
    });

    // 2. Controlled Core Transmit Pipeline
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        if (!input.value.trim()) return;

        const originalText = input.value;
        const isPriorityMessage = toggle.checked; // Capture toggle state at exact moment of transmission

        btn.disabled = true;
        btn.classList.remove('active');
        btn.classList.add('paging');
        btn.textContent = 'PAGING...';

        input.value = '';
        counter.textContent = '160';
        countWrapper.className = 'char-count';

        setTimeout(() => {
            btn.classList.remove('paging');
            btn.classList.add('sent-success');
            btn.textContent = 'SENT';

            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateString = new Date().toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
            const uniquePageId = 'page-' + Date.now();

            const newCard = document.createElement('div');
            // Stamping unique priority tracking memory rule down onto structural class configurations
            newCard.className = isPriorityMessage ? 'log-card is-priority-transmission' : 'log-card';
            newCard.style.marginTop = '15px';
            newCard.innerHTML = `
                <div class="log-timestamp">${dateString} ${timeString}</div>
                <div class="log-text">${originalText}</div>
                <div class="log-status-row">
                    <span class="delivery-status">✓ DELIVERED</span>
                    <span class="read-status unread" id="${uniquePageId}">UNREAD</span>
                </div>
            `;

            if (logHistoryContainer) {
                logHistoryContainer.insertBefore(newCard, logHistoryContainer.firstChild);
            }

            // Asynchronous simulated read notification feedback loop
            setTimeout(() => {
                const receiptBadge = document.getElementById(uniquePageId);
                if (receiptBadge) {
                    receiptBadge.textContent = 'READ';
                    receiptBadge.classList.remove('unread');
                    receiptBadge.classList.add('read');
                }
            }, 4000);

            setTimeout(() => {
                btn.classList.remove('sent-success');
                btn.textContent = 'PAGE';
                btn.disabled = true;
            }, 1500);

        }, 2000); 
    });

    // 3. Telemetry tracking simulations
    function simulateBlipMovement() {
        const blip = document.getElementById('dynamic-blip');
        if (!blip) return;

        const minPct = 40;
        const maxPct = 60;

        setInterval(() => {
            const randomTop = Math.floor(Math.random() * (maxPct - minPct + 1)) + minPct;
            const randomLeft = Math.floor(Math.random() * (maxPct - minPct + 1)) + minPct;

            blip.style.top = `${randomTop}%`;
            blip.style.left = `${randomLeft}%`;
        }, 4000);
    }

    document.addEventListener('DOMContentLoaded', simulateBlipMovement);

    // 4. Console Global Theme Toggle Matrix
    toggle.addEventListener('change', () => {
        if (toggle.checked) {
            document.body.classList.add('priority-mode-active');
        } else {
            document.body.classList.remove('priority-mode-active');
        }
    });

    if (toggle && toggle.checked) {
        document.body.classList.add('priority-mode-active');
    }
</script>
</body>
</html>
