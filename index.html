<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAiGE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PAiGE">

    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #12140e;
            --border-color: #27311b;
            --glow-green: #79f82c;
            --text-dim: #5c6c4c;
            --text-bright: #9efb61;
            --alert-red: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-bright);
            font-family: 'Share Tech Mono', 'Source Code Pro', monospace;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* Container designed to fit mobile viewport */
        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px; /* Space at bottom for home indicator */
        }

        /* Header / Logo */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 10px; /* Adds extra breathing room before the larger logo */
        }

        .logo-image {
            height: 50px; /* Making the logo larger */
            width: auto;  /* Prevents any horizontal stretching */
            display: block;
        }

        /* Message Input Box */
        .input-card {
            border: 1px solid var(--border-color);
            background-color: rgba(39, 49, 27, 0.1);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-bright);
            font-family: inherit;
            font-size: 16px;
            resize: none;
        }

        textarea::placeholder {
            color: var(--text-dim);
        }

        .char-count {
            text-align: right;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Controls: Toggle & Send Button */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        /* Urgency Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(39, 49, 27, 0.4);
            border: 1px solid var(--border-color);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-dim);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(121, 248, 44, 0.2);
            border-color: var(--glow-green);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: var(--glow-green);
            box-shadow: 0 0 8px var(--glow-green);
        }

        .toggle-label {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        input:checked ~ .toggle-label {
            color: var(--glow-green);
        }

        /* Send Button */
        .btn-send {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 8px 24px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-send:active {
            background: rgba(121, 248, 44, 0.1);
            border-color: var(--glow-green);
            color: var(--glow-green);
        }

        .shortcut-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: -8px;
        }

        /* Transmission Log Header */
        .section-header {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        /* Message Bubble Card */
        .log-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-timestamp {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
        }

        .log-text {
            color: var(--text-bright);
            font-size: 15px;
            line-height: 1.4;
        }

        /* Location Tracking Card */
        .location-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 40px; /* Push the access denied text down */
        }

        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location-title {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-bright);
        }

        .btn-enable {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--glow-green);
            padding: 4px 14px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Access Denied Warning */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            padding: 20px 0;
        }

        .error-title {
            color: var(--alert-red);
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .error-desc {
            color: #8c443e;
            font-size: 11px;
            line-height: 1.4;
            max-width: 280px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
      <header>
            <img src="apple-touch-logo.png" alt="PAiGE Logo" class="logo-image">
        </header>

        <div class="input-card">
            <textarea placeholder="TYPE MESSAGE..." maxlength="160" id="message-input"></textarea>
            <div class="char-count"><span id="char-counter">0</span> / 160</div>
            
            <div class="controls">
                <label class="toggle-container">
                    <span class="switch">
                        <input type="checkbox" id="urgency-toggle" checked>
                        <span class="slider"></span>
                    </span>
                    <span class="toggle-label">URGENT</span>
                </label>
                <button class="btn-send">SEND</button>
            </div>
        </div>

        <div class="shortcut-hint">⌘ + ENTER TO SEND</div>

        <div class="section-header">Transmission Log</div>
        <div class="log-card">
            <div class="log-timestamp">Jul 16, 2026 10:47 AM</div>
            <div class="log-text">Hi, When will you be home?</div>
        </div>

        <div class="location-card">
            <div class="location-header">
                <span class="location-title">LOCATION TRACKING</span>
                <button class="btn-enable">ENABLE</button>
            </div>
            
            <div class="error-container">
                <div class="error-title">▲ ACCESS DENIED</div>
                <div class="error-desc">Geolocation has been disabled in this document by permissions policy.</div>
            </div>
        </div>

    </div>

    <script>
        const textarea = document.getElementById('message-input');
        const counter = document.getElementById('char-counter');

        textarea.addEventListener('input', () => {
            counter.textContent = textarea.value.length;
        });
    </script>
</body>
</html>
