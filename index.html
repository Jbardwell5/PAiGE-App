<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAiGE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #12140e;
            --border-color: #27311b;
            --glow-green: #79f82c;
            --text-dim: #5c6c4c;
            --text-bright: #9efb61;
            --alert-red: #ff3b30;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-bright); font-family: 'Share Tech Mono', monospace; padding: 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }

        /* Logo & Status */
        .status-container { position: absolute; top: 15px; right: 20px; font-size: 11px; color: var(--glow-green); opacity: 0.6; }
        .logo-image { height: 125px; width: auto; display: block; margin: 0 auto; }

        /* Input Styling */
        .input-card { border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; min-height: 80px; background: transparent; border: none; color: #fff; font-family: inherit; font-size: 14px; resize: none; outline: none; }
        .char-count { font-size: 10px; color: var(--text-dim); text-align: right; }

        /* Controls & Buttons */
        .controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .btn-send { background: transparent; border: 1px solid var(--border-color); color: rgba(121, 248, 44, 0.25); padding: 8px 16px; font-family: inherit; font-size: 14px; font-weight: bold; cursor: not-allowed; border-radius: 4px; transition: 0.2s; }
        .btn-send.active { color: var(--text-bright); border-color: var(--glow-green); cursor: pointer; }
        .btn-send.paging { animation: transmitPulse 0.5s infinite alternate; }
        .btn-send.sent-success { color: #000; background-color: var(--glow-green); border-color: var(--glow-green); }

        /* History & Map */
        .section-header { font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border-color); padding-bottom: 6px; text-transform: uppercase; margin-top: 10px; }
        .message-card { border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; color: #e0e0e0; font-size: 14px; }
        .message-card .timestamp { font-size: 8px; color: var(--glow-green); margin-bottom: 4px; display: block; }
        .map-container { position: relative; width: 100%; height: 180px; border-radius: 8px; overflow: hidden; background-color: #0f120d; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; }
        .vector-map { width: 110%; height: 110%; opacity: 0.65; }
        .map-land { fill: rgba(255, 255, 255, 0.04); stroke: rgba(121, 248, 44, 0.2); }
        .friend-tracker-dot { position: absolute; top: 48%; left: 48%; width: 6px; height: 6px; background-color: var(--glow-green); border-radius: 50%; box-shadow: 0 0 8px var(--glow-green); }

        @keyframes transmitPulse { 0% { opacity: 0.4; } 100% { opacity: 1; box-shadow: 0 0 10px var(--glow-green); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="status-container">● ONLINE</div>
        <header><img src="apple-touch-logo.png" alt="PAiGE Logo" class="logo-image"></header>

        <!-- Messaging Input -->
        <div class="input-card">
            <textarea placeholder="COMPOSE..." maxlength="160" id="message-input"></textarea>
            <div class="char-count"><span id="char-counter">0</span> / 160</div>
            <div class="controls">
                <span class="toggle-label" style="color: var(--text-dim); font-size: 12px;">PRIORITY</span>
                <button class="btn-send" id="send-btn">PAGE</button>
            </div>
        </div>

        <div id="recentPagesContainer"></div>

        <div class="section-header">Location Tracking</div>
        <div class="map-container">
            <svg class="vector-map" viewBox="0 0 200 120"><path d="M20,95 Q35,70 65,55 T120,35 T160,25 L165,28 Q140,42 110,58 T60,82 T15,102 Z" class="map-land" /></svg>
            <div class="friend-tracker-dot"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('message-input');
        const counter = document.getElementById('char-counter');
        const btn = document.getElementById('send-btn');
        const container = document.getElementById('recentPagesContainer');

        input.addEventListener('input', () => {
            counter.textContent = input.value.length;
            btn.classList.toggle('active', input.value.length > 0);
        });

        btn.addEventListener('click', () => {
            if (!input.value) return;
            
            // UI Paging Animation
            btn.disabled = true;
            btn.classList.replace('active', 'paging');
            btn.textContent = 'PAGING...';

            // Create History Card
            const div = document.createElement('div');
            div.className = 'message-card';
            div.style.marginTop = '10px';
            div.innerHTML = `<span class="timestamp">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>${input.value}`;
            container.prepend(div);

            setTimeout(() => {
                btn.classList.replace('paging', 'sent-success');
                btn.textContent = 'SENT';
                input.value = '';
                counter.textContent = '0';
                setTimeout(() => { btn.textContent = 'PAGE'; btn.classList.remove('sent-success'); btn.disabled = false; }, 1500);
            }, 2000);
        });
    </script>
</body>
</html>
